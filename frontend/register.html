<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicSource — Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page:    #f5f1ea;
            --bg-card:    #ffffff;
            --bg-soft:    #ede7dc;
            --bg-elevated:#faf7f2;
            --border:     #e5dfd2;
            --border-strong: #d4ccba;
            --gold:       #b8945a;
            --gold-deep:  #9a7846;
            --text-bright:#1a1815;
            --text-base:  #3d3a35;
            --text-muted: #7a746a;
            --text-dim:   #a59f93;
        }

        * { font-family: 'Inter', system-ui, sans-serif; }
        .serif { font-family: 'Fraunces', Georgia, serif; }

        .auth-bg {
            background: var(--bg-page);
            min-height: 100vh;
            color: var(--text-base);
        }

        .navbar-custom {
            background: rgba(245, 241, 234, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .logo-text {
            font-family: 'Fraunces', Georgia, serif;
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: -0.02em;
        }
        .logo-pic { color: var(--text-bright); }
        .logo-source { color: var(--gold); }

        .auth-card {
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(60, 50, 30, 0.08);
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .icon-circle {
            background: var(--bg-soft);
            border: 1px solid var(--border-strong);
        }
        .icon-circle i { color: var(--gold); }

        .title-gradient {
            font-family: 'Fraunces', Georgia, serif;
            color: var(--text-bright);
            letter-spacing: -0.02em;
            font-weight: 700;
        }
        .title-gradient .accent { color: var(--gold); font-style: italic; }

        .label-text { color: var(--text-base) !important; font-weight: 600; }
        .label-text-alt { color: var(--text-dim) !important; }

        .input-custom {
            background: var(--bg-elevated) !important;
            border: 1px solid var(--border) !important;
            color: var(--text-bright) !important;
            transition: all 0.2s;
        }
        .input-custom::placeholder { color: var(--text-dim); }
        .input-custom:focus {
            border-color: var(--gold) !important;
            box-shadow: 0 0 0 3px rgba(184, 148, 90, 0.15) !important;
            outline: none;
        }

        .btn-primary-custom {
            background: var(--gold);
            color: white;
            border: none;
            box-shadow: 0 1px 3px rgba(184, 148, 90, 0.25);
            transition: all 0.2s;
            font-weight: 600;
        }
        .btn-primary-custom:hover {
            background: var(--gold-deep);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(184, 148, 90, 0.35);
        }
        .btn-outline-custom {
            background: transparent;
            border: 1px solid var(--border-strong);
            color: var(--text-bright);
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-outline-custom:hover {
            background: var(--bg-soft);
            border-color: var(--gold);
            color: var(--text-bright);
        }

        .divider-custom { color: var(--text-muted) !important; }
        .divider-custom::before,
        .divider-custom::after { background: var(--border) !important; }

        .flash-success { background: #e8f5e9; color: #2e6b32; border-left: 4px solid #4caf50; }
        .flash-error   { background: #fdecea; color: #a93226; border-left: 4px solid #e74c3c; }
        .flash-warning { background: #fef5e7; color: #8b6914; border-left: 4px solid #f39c12; }
        .flash-info    { background: #e8f0f5; color: #2c5876; border-left: 4px solid #3498db; }

        .footer-custom {
            background: var(--bg-soft);
            border-top: 1px solid var(--border);
            color: var(--text-muted);
        }
    </style>
</head>
<body class="auth-bg flex flex-col min-h-screen">

    <div class="navbar navbar-custom px-8">
        <a href="/" class="btn btn-ghost hover:bg-transparent">
            <i class="fa-solid fa-camera mr-2 text-xl" style="color: var(--text-bright)"></i>
            <span class="logo-text"><span class="logo-pic">Pic</span><span class="logo-source">Source</span></span>
        </a>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="container mx-auto px-4 pt-4 max-w-md">
                {% for category, message in messages %}
                    <div class="flash-{{ category }} rounded-lg p-3 mb-2 text-sm font-medium">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <div class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="auth-card card w-full max-w-md rounded-xl">
            <div class="card-body p-10">

                <div class="text-center mb-8">
                    <div class="icon-circle inline-flex items-center justify-center w-16 h-16 rounded-full mb-4">
                        <i class="fa-solid fa-user-plus text-2xl"></i>
                    </div>
                    <h1 class="text-3xl title-gradient">Create <span class="accent">account</span></h1>
                    <p style="color: var(--text-muted)" class="text-sm mt-2">Join PicSource and start sharing</p>
                </div>

                <form action="/register" method="POST" class="space-y-5" id="regForm">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="form-control">
                        <label class="label pb-1">
                            <span class="label-text">Username</span>
                        </label>
                        <input type="text" name="username" id="usernameInput"
                               placeholder="Choose a username"
                               class="input input-custom w-full"
                               autocomplete="username" required minlength="3" />
                        <label class="label pt-1">
                            <span class="label-text-alt">At least 3 characters, lowercase</span>
                        </label>
                    </div>

                    <div class="form-control">
                        <label class="label pb-1">
                            <span class="label-text">Password</span>
                        </label>
                        <input type="password" name="password" id="passwordInput"
                            placeholder="Enter password"
                            class="input input-custom w-full"
                            autocomplete="new-password" required />
                    </div>

                    <div class="form-control">
                        <label class="label pb-1">
                            <span class="label-text">Confirm Password</span>
                        </label>
                        <input type="password" name="confirm_password" id="confirmInput"
                               placeholder="Repeat your password"
                               class="input input-custom w-full"
                               autocomplete="new-password" required />
                        <label class="label pt-1">
                            <span id="matchLabel" class="label-text-alt"></span>
                        </label>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-primary-custom btn-block mt-2 text-base">
                        Create Account
                    </button>
                </form>

                <div class="divider divider-custom text-xs">Already have an account?</div>

                <a href="/login" class="btn btn-outline-custom btn-block">
                    Sign In
                </a>

            </div>
        </div>
    </div>

    <footer class="footer footer-center p-6 footer-custom">
        <p class="font-bold text-sm serif">PicSource &copy; 2026</p>
    </footer>

    <script>
        const pwInput      = document.getElementById('passwordInput');
        const confirmInput = document.getElementById('confirmInput');
        const matchLbl     = document.getElementById('matchLabel');

        confirmInput.addEventListener('input', () => {
            if (confirmInput.value === '') {
                matchLbl.textContent = '';
            } else if (confirmInput.value === pwInput.value) {
                matchLbl.textContent = '✓ Passwords match';
                matchLbl.style.color = '#2e6b32';
            } else {
                matchLbl.textContent = '✗ Passwords do not match';
                matchLbl.style.color = '#a93226';
            }
        });

        document.getElementById('regForm').addEventListener('submit', (e) => {
            if (pwInput.value !== confirmInput.value) {
                e.preventDefault();
                matchLbl.textContent = '✗ Passwords do not match';
                matchLbl.style.color = '#a93226';
            }
        });
    </script>
</body>
</html>
