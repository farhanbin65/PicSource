<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicSource - Upload</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.css" rel="stylesheet" type="text/css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <!-- SQL.js for SQLite in browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <!-- FileSaver.js to save files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body class="bg-base-200 min-h-screen flex flex-col">
    <!-- Navbar -->
    <div class="navbar bg-base-100 shadow-lg px-4 md:px-8">
        <div class="flex-1">
            <a href="index.html" class="btn btn-ghost text-xl">
                <i class="fa-solid fa-camera mr-2 text-primary"></i>
                PicSource
            </a>
        </div>
        <div class="flex-none gap-2">
            <ul class="menu menu-horizontal px-1">
                <li><a href="index.html">Home</a></li>
                <li><a href="upload.html" class="active">Upload</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mx-auto px-4 py-8 flex-grow">
        <div class="max-w-2xl mx-auto">
            <h1 class="text-3xl font-bold mb-8 text-center">Upload Your Image</h1>
            
            <!-- Upload Form -->
            <form id="uploadForm" class="bg-base-100 shadow-xl rounded-lg p-8">
                <!-- Image Preview -->
                <div class="mb-6">
                    <div id="previewContainer" class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hidden">
                        <img id="imagePreview" src="#" alt="Preview" class="max-h-64 mx-auto mb-2">
                    </div>
                </div>

                <!-- File Input -->
                <div class="form-control mb-4">
                    <label class="label">
                        <span class="label-text">Choose Image</span>
                    </label>
                    <input type="file" id="imageInput" accept="image/jpeg,image/png,image/gif,image/webp" class="file-input file-input-bordered w-full" required>
                    <label class="label">
                        <span class="label-text-alt text-gray-500">Accepted: JPG, PNG, GIF, WEBP (Max 5MB)</span>
                    </label>
                </div>

                <!-- Title -->
                <div class="form-control mb-4">
                    <label class="label">
                        <span class="label-text">Title</span>
                    </label>
                    <input type="text" id="title" class="input input-bordered" required>
                </div>

                <!-- Photographer -->
                <div class="form-control mb-4">
                    <label class="label">
                        <span class="label-text">Photographer</span>
                    </label>
                    <input type="text" id="photographer" class="input input-bordered" required>
                </div>

                <!-- Category -->
                <div class="form-control mb-4">
                    <label class="label">
                        <span class="label-text">Category</span>
                    </label>
                    <select id="category" class="select select-bordered">
                        <option value="Nature">Nature</option>
                        <option value="Technology">Technology</option>
                        <option value="People">People</option>
                        <option value="Architecture">Architecture</option>
                        <option value="Art">Art</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Description -->
                <div class="form-control mb-4">
                    <label class="label">
                        <span class="label-text">Description</span>
                    </label>
                    <textarea id="description" class="textarea textarea-bordered" rows="3"></textarea>
                </div>

                <!-- Submit Button -->
                <div class="form-control mt-6">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-upload mr-2"></i>
                        Upload Image
                    </button>
                </div>
            </form>

            <!-- Upload Status -->
            <div id="uploadStatus" class="mt-4"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer footer-center p-10 bg-base-300 text-base-content rounded">
        <div>
            <p class="font-bold text-lg">
                <i class="fa-solid fa-camera mr-2"></i>PicSource
            </p>
            <p>Your source for amazing photography</p>
            <p>Copyright &copy; 2024 - All rights reserved</p>
        </div>
        <div>
            <div class="grid grid-flow-col gap-4">
                <a class="link link-hover"><i class="fa-brands fa-twitter"></i></a>
                <a class="link link-hover"><i class="fa-brands fa-instagram"></i></a>
                <a class="link link-hover"><i class="fa-brands fa-facebook"></i></a>
            </div>
        </div>
    </footer>

    <script src="js/upload.js"></script>
</body>
</html>
